<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw 使用指南</title>
  <script>
    // GitHub Pages SPA 路由重定向方案
    // 将当前路径保存到 sessionStorage，然后重定向到 index.html
    sessionStorage.setItem('redirect_path', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace(window.location.origin + '/openclaw-guide/');
  </script>
</head>
<body>
  <p>正在跳转...</p>
</body>
</html>
